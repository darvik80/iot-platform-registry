ssl_options.cacertfile = /etc/rabbitmq/cert/result/ca_certificate.pem
ssl_options.certfile   = /etc/rabbitmq/cert/result/server_rabbitmq_certificate.pem
ssl_options.keyfile    = /etc/rabbitmq/cert/result/server_rabbitmq_key.pem
ssl_options.verify     = verify_none
ssl_options.fail_if_no_peer_cert = false

mqtt.listeners.ssl.default = 0.0.0.0:8883
mqtt.listeners.tcp.default = 0.0.0.0:1883
mqtt.default_user = mqtt
mqtt.default_pass = mqtt
mqtt.allow_anonymous = true

# 24 hours by default
mqtt.max_session_expiry_interval_seconds = 86400000
mqtt.prefetch         = 100
